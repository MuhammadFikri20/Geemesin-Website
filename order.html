<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Order | Geemesin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="order-page">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-pink fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold text-white" href="index.html">Geemesin</a>

    <ul class="navbar-nav ms-auto">
      <li class="nav-item">
        <a class="nav-link btn btn-order" href="index.html">Back</a>
      </li>
    </ul>
  </div>
</nav>

<!-- Header -->
<section class="hero">
  <div class="hero-overlay"></div>

  <div class="container text-center">
    <h1 class="hero-title">Order Produk</h1>
    <p class="hero-text">
      Isi form di bawah dan pesanan kamu langsung kami proses 💕
    </p>
  </div>
</section>

<!-- Order Form -->
<section class="section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">

        <div class="card order-card p-4">
          <form id="orderForm">

            <div class="mb-3">
              <label class="form-label">Nama Lengkap</label>
              <input type="text" id="name" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Produk</label>

              <select id="product" class="form-control" required>
                <option value=""> Pilih Geemesin Produk </option>
                <option value="Bracelets">Bracelets</option>
                <option value="Keychain">Keychain</option>
                <option value="Phone Strap">Phone Strap</option>
                <option value="Custom Request">Custom Request</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Jumlah</label>
              <input type="number" id="qty" class="form-control" min="1" value="1">
            </div>

            <div class="mb-3">
              <label class="form-label">Alamat Pengiriman</label>
              <textarea id="address" class="form-control" rows="3" required></textarea>
            </div>

            <button type="submit" class="btn btn-main w-100">
              Kirim ke WhatsApp
            </button>

          </form>
        </div>

      </div>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <p>© 2026 Geemesin Handmade</p>
</footer>

<script>
const params = new URLSearchParams(window.location.search);
const productInput = document.getElementById("product");

const selectedProduct = params.get("product");

if (selectedProduct) {
  productInput.value = selectedProduct;
}

document.getElementById("orderForm").addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const product = document.getElementById("product").value;
  const qty = document.getElementById("qty").value;
  const address = document.getElementById("address").value;

  const message =
`Halo Geemesin 💖
Saya mau order:

Nama: ${name}
Produk: ${product}
Jumlah: ${qty}
Alamat: ${address}

Terimakasih 🙏🏼💕💕`;

  const phone = "6285878060249";
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
});
</script>

</body>
</html>
